# =============================================================================
# Data collection settings
# =============================================================================
data:
  parallel_samples_per_lang: 500
  cultural_sentences_per_topic: 200
  min_sentence_length: 10
  max_sentence_length: 512

# =============================================================================
# Analysis settings
# =============================================================================
analysis:
  seed: 42
  n_pca_components: 3
  significance_level: 0.05

# =============================================================================
# Steering experiment settings (BLEnD benchmark)
# =============================================================================
steering:
  layers_to_steer: [3, 4, 5, 12, 16, 20]
  alpha_range: [0.5, 1.0, 2.0, 4.0, 8.0]
  max_new_tokens: 50
  num_generations: 5
  temperature: 0.7
  llm_judge_model: "gpt-4o"
  blend_languages: ["ar", "zh", "es", "ko", "en", "el", "fa", "id", "am", "az", "ha", "as"]

# =============================================================================
# Attribution patching settings
# =============================================================================
attribution:
  n_sentence_pairs: 100
  components: ["attn", "mlp"]
  head_level: true
  batch_size: 4

# =============================================================================
# Cross-analysis settings (Phase 4)
# =============================================================================
cross_analysis:
  key_layers: [3, 5, 12, 20]
  n_permutations: 10000
  probe_n_sentences: 50
  probe_cv_folds: 5
  transfer_alpha: 4.0
  transfer_layers: [5, 12, 20]
  transfer_max_questions: 50   # max MCQ questions sampled per (topic, target_lang) condition
  steering_matrix_alpha: [2.0, 4.0]
  steering_matrix_n_prompts: 10
  representative_langs: ["en", "ar", "zh", "hi", "ko", "fr", "am", "id"]

language_families:
  indo_european: ["en", "fr", "de", "es", "hi", "fa", "el", "ru", "as"]
  sino_tibetan: ["zh"]
  japonic: ["ja"]
  koreanic: ["ko"]
  afro_asiatic: ["ar", "am", "ha"]
  austronesian: ["id", "su"]
  turkic: ["az"]

script_families:
  latin: ["en", "fr", "de", "es", "id", "az", "ha", "su"]
  arabic: ["ar", "fa"]
  cjk: ["zh", "ja"]
  devanagari: ["hi"]
  cyrillic: ["ru"]
  hangul: ["ko"]
  greek: ["el"]
  ethiopic: ["am"]
  bengali: ["as"]

# =============================================================================
# Output paths (organized by experiment)
# =============================================================================
paths:
  # ── Legacy (kept for backward compat) ──
  output_dir: "outputs"
  data_dir: "outputs/data"
  parallel_dir: "outputs/data/parallel"
  cultural_dir: "outputs/data/cultural"
  vector_dir: "outputs/vectors"
  language_vector_dir: "outputs/vectors/language_vectors"
  topic_vector_dir: "outputs/vectors/topic_vectors"
  analysis_dir: "outputs/analysis"
  plot_dir: "outputs/plots"
  steering_dir: "outputs/steering"

  # ── Vector Analysis ──
  va_data_dir: "vector_analysis/results/data"
  va_parallel_dir: "vector_analysis/results/data/parallel"
  va_cultural_dir: "vector_analysis/results/data/cultural"
  va_vector_dir: "vector_analysis/results/vectors"
  va_language_vector_dir: "vector_analysis/results/vectors/language_vectors"
  va_topic_vector_dir: "vector_analysis/results/vectors/topic_vectors"
  va_analysis_dir: "vector_analysis/results/analysis"
  va_plot_dir: "vector_analysis/results/plots"

  # ── Steering (BLEnD) ──
  steering_data_dir: "steering/results/data"
  steering_mcqa_dir: "steering/results/mcqa"
  steering_saq_dir: "steering/results/saq"
  steering_judge_dir: "steering/results/judge"
  steering_analysis_dir: "steering/results/analysis"
  steering_plot_dir: "steering/results/plots"

  # ── Attribution Patching ──
  ap_patching_dir: "attribution_patching/results/patching"
  ap_analysis_dir: "attribution_patching/results/analysis"
  ap_plot_dir: "attribution_patching/results/plots"

  # ── Cross Analysis (Phase 4) ──
  ca_analysis_dir: "cross_analysis/results/analysis"
  ca_plot_dir: "cross_analysis/results/plots"
  ca_external_dir: "cross_analysis/results/external_data"
  ca_probe_dir: "cross_analysis/results/probes"
