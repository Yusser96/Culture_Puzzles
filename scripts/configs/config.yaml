# =============================================================================
# Configuration for Culture Vector Analysis Pipeline
# =============================================================================

model:
  name: "Qwen/Qwen3-8B"
  # Layers to extract activations from. "all" for every layer.
  # Or specify a list like [0, 4, 8, 12, 16, 20, 24, 28, 31]
  layers: "all"
  batch_size: 4
  max_seq_len: 128
  device: "cuda"
  dtype: "float16"  # float16 or bfloat16

# =============================================================================
# Languages (18 total: original 10 + 8 new for BLEnD coverage)
# =============================================================================
languages:
  # ── Original 10 ──
  - code: "en"
    name: "English"
    flores: "eng_Latn"
    wiki: "en"
  - code: "fr"
    name: "French"
    flores: "fra_Latn"
    wiki: "fr"
  - code: "de"
    name: "German"
    flores: "deu_Latn"
    wiki: "de"
  - code: "ar"
    name: "Arabic"
    flores: "arb_Arab"
    wiki: "ar"
  - code: "zh"
    name: "Chinese"
    flores: "zho_Hans"
    wiki: "zh"
  - code: "ja"
    name: "Japanese"
    flores: "jpn_Jpan"
    wiki: "ja"
  - code: "hi"
    name: "Hindi"
    flores: "hin_Deva"
    wiki: "hi"
  - code: "es"
    name: "Spanish"
    flores: "spa_Latn"
    wiki: "es"
  - code: "ru"
    name: "Russian"
    flores: "rus_Cyrl"
    wiki: "ru"
  - code: "ko"
    name: "Korean"
    flores: "kor_Hang"
    wiki: "ko"
  # ── New 8 (BLEnD coverage) ──
  - code: "el"
    name: "Greek"
    flores: "ell_Grek"
    wiki: "el"
  - code: "fa"
    name: "Persian"
    flores: "pes_Arab"
    wiki: "fa"
  - code: "id"
    name: "Indonesian"
    flores: "ind_Latn"
    wiki: "id"
  - code: "am"
    name: "Amharic"
    flores: "amh_Ethi"
    wiki: "am"
  - code: "az"
    name: "Azerbaijani"
    flores: "azj_Latn"
    wiki: "az"
  - code: "ha"
    name: "Hausa"
    flores: "hau_Latn"
    wiki: "ha"
  - code: "su"
    name: "Sundanese"
    flores: "sun_Latn"
    wiki: "su"
  - code: "as"
    name: "Assamese"
    flores: "asm_Beng"
    wiki: "as"

