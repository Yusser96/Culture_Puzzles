# =============================================================================
# Configuration for the Cultural Riddles (puzzles) Vector Pipeline
# =============================================================================
# This config drives the riddle-centric collection + vector pipeline:
#   01_collect_puzzles.py  -> 02_collect_parallel.py -> 03_collect_topics.py
#   -> 04_compute_vectors.py
#
# The primary key across the whole pipeline is the **lang_region** (e.g.
# "Arabic_Egypt"), defined in the `lang_regions` registry below. FLORES and
# Wikipedia are keyed by language, so the registry is variety-aware: each
# region maps to the most region-specific wiki/flores code a source offers,
# falling back to the base language, and `null` where a source has nothing.
# =============================================================================

model:
  name: "Qwen/Qwen3-1.7B"
  # Layers to extract activations from. "all" for every layer.
  # Or specify a list like [0, 4, 8, 12, 16, 20, 24, 28, 31]
  layers: "all"
  batch_size: 4
  max_seq_len: 128
  # device: "cuda" (NVIDIA GPU) | "mps" (Apple Silicon) | "cpu"
  device: "mps"
  # dtype: "float16" | "bfloat16" | "float32".
  # On Apple MPS, float16 is the safe choice (bfloat16 support is partial).
  dtype: "float16"

# =============================================================================
# Data collection settings
# =============================================================================
data:
  parallel_samples_per_lang: 500
  topic_sentences_per_lang: 200
  min_sentence_length: 10
  max_sentence_length: 512
  # Joins the riddle text and its reference answer on a single corpus line.
  riddle_join: "  ||  "

# =============================================================================
# Analysis settings
# =============================================================================
analysis:
  seed: 42
  n_pca_components: 3
  significance_level: 0.05

# =============================================================================
# Output paths
# =============================================================================
paths:
  puzzles_src_dir: "../v0 - due May 29"
  # vector_analysis lives on external storage (Extreme SSD).
  va_data_dir:     "/Volumes/Extreme SSD/dfki/2026/Culture_puzzles/vector_analysis/results/data"
  va_puzzles_dir:  "/Volumes/Extreme SSD/dfki/2026/Culture_puzzles/vector_analysis/results/data/puzzles"
  va_parallel_dir: "/Volumes/Extreme SSD/dfki/2026/Culture_puzzles/vector_analysis/results/data/parallel"
  va_cultural_dir: "/Volumes/Extreme SSD/dfki/2026/Culture_puzzles/vector_analysis/results/data/cultural"
  # Unified vector output: vectors/<dataname>/...
  va_vector_dir:   "/Volumes/Extreme SSD/dfki/2026/Culture_puzzles/vector_analysis/results/vectors"
  # Backward-compatible trees written by 04 so 05/06 keep working unchanged.
  va_language_vector_dir: "/Volumes/Extreme SSD/dfki/2026/Culture_puzzles/vector_analysis/results/vectors/language_vectors"
  va_topic_vector_dir:    "/Volumes/Extreme SSD/dfki/2026/Culture_puzzles/vector_analysis/results/vectors/topic_vectors"

# =============================================================================
# lang_region registry (variety-aware). null = that source is unavailable.
#   key           exact bracket text from the xlsx filename (primary key)
#   base_language human-readable language family of the region
#   wiki          Wikipedia edition code (region variety if it exists, else base)
#   flores        FLORES-200 code (region variety if it exists, else base)
#   opus          OPUS-100 en-xx language code (base-language level only)
# =============================================================================
lang_regions:
  - {key: "Arabic_Egypt",               base_language: "Arabic",     wiki: "arz",    flores: "arz_Arab", opus: "ar"}
