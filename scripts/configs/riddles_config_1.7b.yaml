# =============================================================================
# Topic vocabulary
# =============================================================================
# Maps the (sometimes messy) v0 sheet "Topic" labels to canonical topic keys.
# Only the 8 canonical topics present in every file are mapped; any other label
# is recorded verbatim under "other" in the puzzles manifest.
topic_label_map:
  "Politics": politics
  "Kid's World": kids_world
  "National Heritage": national_heritage
  "Everyday Life": everyday_life
  "Sports": sports
  "Geography": geography
  "Arts": arts
  "History": history

# v0's 8 canonical topics. `seed_en` are English Wikipedia seed articles; the
# topic collector resolves each into a region's `wiki` edition via interlanguage
# links (langlinks), so we only author 8 English seed lists (not 8 x 39).
# "<country>" placeholders are filled from the region at collection time.
cultural_topics:
  politics:
    description: "Politics, government, elections, civic life"
    seed_en: ["Politics", "Government", "Election", "Politics of <country>"]
  kids_world:
    description: "Childhood, children's games, toys, school life"
    seed_en: ["Childhood", "Children's games", "Toy", "Nursery rhyme"]
  national_heritage:
    description: "Cultural heritage, national symbols, folklore, traditions"
    seed_en: ["Cultural heritage", "National symbol", "Folklore", "Tradition"]
  everyday_life:
    description: "Everyday life, daily routine, household, customs"
    seed_en: ["Everyday life", "Daily life", "Household", "Custom (law)"]
  sports:
    description: "Sports culture, national sports, athletics, games"
    seed_en: ["Sport", "National sport", "Athletics (physical culture)", "Traditional games"]
  geography:
    description: "Geography, landscapes, rivers, regions, landmarks"
    seed_en: ["Geography", "Geography of <country>", "River", "Mountain"]
  arts:
    description: "The arts, music, visual arts, literature"
    seed_en: ["The arts", "Music", "Visual arts", "Literature"]
  history:
    description: "History, historical events, ancient and modern"
    seed_en: ["History", "History of <country>", "Ancient history", "Modern history"]
